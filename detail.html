<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>口臭・健康リスク解説ガイド | 下関市</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans JP', sans-serif; color: #2D3748; background-color: #F7FAFC; line-height: 1.8; }
        .content-section { display: none; }
        .content-section.active { display: block; animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .info-card { background: white; border: 1px solid #E2E8F0; border-radius: 8px; padding: 1.5rem; margin-bottom: 2rem; }
        .category-tag { font-size: 10px; font-weight: bold; color: #718096; letter-spacing: 0.1em; border-bottom: 1px solid #E2E8F0; padding-bottom: 0.5rem; margin-bottom: 1rem; display: block; }
        .risk-label { font-size: 11px; font-weight: bold; color: #E53E3E; background: #FFF5F5; padding: 2px 8px; border-radius: 4px; margin-right: 8px; }
        .clinic-label { font-size: 11px; font-weight: bold; color: #2B6CB0; background: #EBF8FF; padding: 2px 8px; border-radius: 4px; }
        .advice-box { background-color: #F8FAFC; border-left: 2px solid #1A365D; padding: 1rem; margin-top: 1rem; font-size: 12px; }
        .physio-accent { border-top: 4px solid #3182CE; }
        .patho-accent { border-top: 4px solid #E53E3E; }
        
        .tab-btn { transition: all 0.2s ease; position: relative; }
        .tab-btn.active { color: #1A365D; font-weight: bold; }
        .tab-btn.active::after { content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 2px; background-color: #1A365D; }
    </style>
</head>
<body class="pb-20">

    <header class="bg-white border-b sticky top-0 z-50 text-center">
        <div class="max-w-xl mx-auto px-6 py-4 flex justify-between items-center">
            <span class="text-[#1A365D] font-bold text-sm tracking-tight cursor-pointer" onclick="location.href='index.html'">口臭＆健康リスク診断</span>
            <button onclick="location.href='index.html'" class="text-[11px] font-bold text-slate-500 border border-slate-300 px-4 py-1.5 rounded">診断に戻る</button>
        </div>
        <div class="max-w-xl mx-auto flex">
            <button id="tab1" onclick="switchCategory('physio')" class="w-1/2 py-4 text-xs font-bold text-slate-400 tab-btn active">一時的・習慣的要因</button>
            <button id="tab2" onclick="switchCategory('patho')" class="w-1/2 py-4 text-xs font-bold text-slate-400 tab-btn">健康的・疾患サイン</button>
        </div>
    </header>

    <main class="max-w-xl mx-auto p-6">

        <div id="physio-content" class="content-section active">
            <div id="physio-list"></div>
        </div>

        <div id="patho-content" class="content-section">
            <div id="patho-list"></div>
        </div>

        <div class="mt-12 bg-[#1A365D] rounded-lg p-8 text-white">
            <h3 class="font-bold text-sm mb-4 tracking-wider uppercase border-b border-white/20 pb-2">Shimonoseki City Health Information</h3>
            <p class="text-xs leading-relaxed opacity-90 mb-6">下関市では「しものせき21」計画に基づき、市民の皆様の口腔保健を支援しています。気になる症状がある場合は、早めにかかりつけ医へご相談ください。</p>
            <button onclick="location.href='index.html'" class="w-full bg-white text-[#1A365D] font-bold py-4 rounded text-sm hover:bg-slate-50 transition-all">診断トップへ戻る</button>
        </div>
    </main>

    <script>
        const physioData = [
            { q: "Q1. 起床・空腹時の悩み", risk: "生理的口臭", clinic: "歯科医院", desc: "睡眠中の唾液減少により細菌が増殖。朝食や水分補給で改善します。", adv: "起きたらまずお水でうがいをして、細菌を洗い流しましょう。" },
            { q: "Q2. 舌の表面の白さ", risk: "舌苔（ぜったい）", clinic: "歯科医院", desc: "細菌や死んだ細胞が舌に付着。口臭の最大の原因の一つです。", adv: "1日1回、朝に専用の舌クリーナーで優しく掃除してください。" },
            { q: "Q3. 強いストレス", risk: "口腔乾燥症（ドライマウス）", clinic: "歯科医院・心療内科", desc: "ストレスは自律神経を乱し、唾液の分泌を著しく低下させます。", adv: "深呼吸を心がけ、リラックスする時間を意図的に作りましょう。" },
            { q: "Q4. 緊張による粘つき", risk: "緊張性口腔乾燥", clinic: "歯科医院", desc: "交感神経が優位になると唾液が粘つき、細菌を留めてしまいます。", adv: "舌を口の中で回す「唾液腺マッサージ」が即効性があります。" },
            { q: "Q5. 水分摂取不足", risk: "脱水による口腔乾燥", clinic: "一般内科", desc: "体内の水分不足は唾液量を減らし、口内の自浄作用を妨げます。", adv: "1.5L〜2Lを目安に、こまめに水を飲む習慣をつけましょう。" },
            { q: "Q6. ホルモンバランス", risk: "更年期・生理前後口臭", clinic: "婦人科・歯科", desc: "女性ホルモンの変化は唾液の質や歯ぐきの炎症に影響します。", adv: "時期に合わせて、いつもより丁寧な口腔ケアを心がけましょう。" },
            { q: "Q7. 睡眠不足・疲れ", risk: "免疫力低下による歯肉炎", clinic: "歯科医院", desc: "免疫力が落ちると潜伏している菌が活発になり、ニオイが強まります。", adv: "お口の健康は全身の鏡。まずは質の良い睡眠を優先してください。" },
            { q: "Q8. 特定の飲食", risk: "外来性口臭", clinic: "セルフケア", desc: "ニンニクや酒類が代謝され、肺からの呼気として排出されます。", adv: "リンゴジュースや緑茶には成分を抑える効果があります。" },
            { q: "Q9. 歯磨きの頻度", risk: "歯垢（プラーク）蓄積", clinic: "歯科医院", desc: "磨き残しは細菌の塊。特に就寝前のケア不足はリスクを激増させます。", adv: "毎食後が理想ですが、特に「寝る前」は時間をかけて磨きましょう。" },
            { q: "Q10. 口呼吸の習慣", risk: "口呼吸による口腔乾燥", clinic: "耳鼻咽喉科・歯科", desc: "鼻を通さない空気は口を乾燥させ、細菌の繁殖を助けます。", adv: "意識的に鼻呼吸を行い、就寝時は加湿器の使用も検討を。" }
        ];

        const pathoData = [
            { q: "Q11. 2週間以上の継続", risk: "慢性的疾患の可能性", clinic: "歯科医院・内科", desc: "一時的でない口臭は、根本的な原因が体に潜んでいるサインです。", adv: "自己判断せず、一度専門機関のチェックを受けてください。" },
            { q: "Q12. 歯ぐきの出血", risk: "歯周病（歯肉炎・歯周炎）", clinic: "歯科医院", desc: "出血は炎症の証拠。放置すると歯を支える骨が溶けてしまいます。", adv: "歯周病は全身疾患（糖尿病等）とも密接に関係しています。" },
            { q: "Q13. 歯ぐきの腫れ", risk: "歯周膿瘍", clinic: "歯科医院", desc: "ポケットの奥に膿が溜まっている可能性があり、強い悪臭を放ちます。", adv: "激しい痛みが出る前に、歯科でのプロケアが必要です。" },
            { q: "Q14. 喉の乾き・多尿", risk: "糖尿病", clinic: "糖尿病内科", desc: "高血糖になると尿量が増え、体が脱水状態になり口が乾きます。", adv: "市の特定健診などで、血糖値の推移を確認しましょう。" },
            { q: "Q15. 鼻詰まり・後鼻漏", risk: "副鼻腔炎（蓄膿症）", clinic: "耳鼻咽喉科", desc: "鼻の奥に溜まった膿のニオイが、口から漏れ出すことがあります。", adv: "鼻の不調が口臭の原因になることもあるため、耳鼻科受診を。" },
            { q: "Q16. 全身のだるさ", risk: "肝機能・腎機能低下", clinic: "一般内科", desc: "老廃物の排出が滞ると、アンモニアのような呼気が出ることがあります。", adv: "体調不良が続く場合は、血液検査を伴う全身チェックを。" },
            { q: "Q17. 胃もたれ・胸焼け", risk: "逆流性食道炎・胃炎", clinic: "消化器内科", desc: "胃の内容物が逆流したり、消化不良による発酵臭が上がります。", adv: "食後すぐに横にならない、消化の良い食事を意識しましょう。" },
            { q: "Q18. 喫煙習慣", risk: "タール沈着・歯周病悪化", clinic: "禁煙外来・歯科", desc: "タバコは血管を収縮させ、歯周病を自覚しにくくさせます。", adv: "下関市では禁煙支援も行っています。健康のために減煙から。" },
            { q: "Q19. 急な眠気・甘い物", risk: "血糖値スパイク", clinic: "内科", desc: "血糖の乱高下はお口の環境を悪化させ、歯周病を促進します。", adv: "食事の順番（野菜から食べる等）を工夫してみましょう。" },
            { q: "Q20. 夕方のむくみ", risk: "循環器系・腎機能", clinic: "内科", desc: "全身の巡りが悪いと唾液分泌にも影響し、口腔環境が低下します。", adv: "塩分を控えめにし、軽いウォーキングで血流を促しましょう。" }
        ];

        function renderList(data, targetId, accentClass) {
            const container = document.getElementById(targetId);
            container.innerHTML = data.map(item => `
                <section class="info-card ${accentClass}">
                    <span class="category-tag">${item.q}</span>
                    <h3 class="text-base font-bold text-slate-800 mb-2">${item.desc}</h3>
                    <div class="flex flex-wrap gap-2 mb-4">
                        <span class="risk-label">想定リスク：${item.risk}</span>
                        <span class="clinic-label">推奨：${item.clinic}</span>
                    </div>
                    <div class="advice-box">
                        <span class="font-bold text-[#1A365D]">アドバイス：</span>${item.adv}
                    </div>
                </section>
            `).join('');
        }

        window.onload = function() {
            renderList(physioData, 'physio-list', 'physio-accent');
            renderList(pathoData, 'patho-list', 'patho-accent');
            
            const savedData = localStorage.getItem('kuchi_check_result');
            if (savedData && JSON.parse(savedData).s2 > 35) switchCategory('patho');
        };

        function switchCategory(cat) {
            const physio = document.getElementById('physio-content');
            const patho = document.getElementById('patho-content');
            const tab1 = document.getElementById('tab1');
            const tab2 = document.getElementById('tab2');
            if (cat === 'physio') {
                physio.classList.add('active'); patho.classList.remove('active');
                tab1.classList.add('active'); tab2.classList.remove('active');
            } else {
                patho.classList.add('active'); physio.classList.remove('active');
                tab2.classList.add('active'); tab1.classList.remove('active');
            }
            window.scrollTo(0, 0);
        }
    </script>
</body>
</html>
